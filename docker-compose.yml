services:
  web:
    build: docker/web
    volumes:
      - ./:/var/www
      - ./public:/var/www/html
    ports:
      - 8083:80
    networks:
      - default
    links:
      - db
  db:
    image: mysql:8.1
    volumes:
      - ./docker/db/data:/var/lib/mysql
    ports:
      - 3308:3306
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: database
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    networks:
      - default
networks:
  default:
